<!DOCTYPE html>
<html>
<head>
  <title>ASM Global AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      display:flex;
      height:100vh;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    .sidebar {
      width:260px;
      background:#020617;
      padding:15px;
      display:flex;
      flex-direction:column;
    }

    .mode-btn {
      padding:10px;
      margin-bottom:8px;
      border:none;
      background:#1e293b;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }
#subModes {
  margin-top: 10px;
  padding: 5px;
  background: #020617;
  border-radius: 6px;
}
    .mode-btn.active {
      background:#3b82f6;
    }

    .chat-list {
      flex:1;
      margin-top:10px;
      overflow:auto;
    }

    .chat-item {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:8px;
      border-radius:6px;
      margin-bottom:5px;
      background:#020617;
    }

    .chat-item:hover {
      background:#1e293b;
    }

    .chat-title {
      flex:1;
      cursor:pointer;
    }

    .actions button {
      margin-left:5px;
      background:none;
      border:none;
      color:white;
      cursor:pointer;
    }

    .profile {
      margin-top:auto;
      position:relative;
    }

    .profile-menu {
      display:none;
      position:absolute;
      bottom:60px;
      left:0;
      width:220px;
      background:white;
      color:black;
      border-radius:12px;
      padding:10px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .topbar {
      padding:15px;
      background:#020617;
      display:flex;
      justify-content:space-between;
    }

    .chat {
      flex:1;
      padding:20px;
      overflow:auto;
    }

    .msg {
      display:flex;
      margin-bottom:10px;
    }

    .msg.user { justify-content:flex-end; }

    .bubble {
      max-width:60%;
      padding:10px;
      border-radius:12px;
    }

    .user .bubble { background:#3b82f6; }
    .ai .bubble { background:#1e293b; }

    .inputBox {
      padding:15px;
      display:flex;
      gap:10px;
      background:#020617;
    }

    input {
      flex:1;
      padding:10px;
      border:none;
      border-radius:6px;
    }

    #auth {
      position:fixed;
      inset:0;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .auth-box {
      background:#020617;
      padding:30px;
      border-radius:10px;
      width:300px;
      text-align:center;
    }

    .auth-box input {
      width:100%;
      margin:10px 0;
      padding:10px;
      border-radius:6px;
      border:none;
    }

    .auth-box button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#3b82f6;
  color:white;
}
  </style>
</head>

<body>

<!-- =====================================================
   🔐 AUTH SECTION
===================================================== -->
<div id="auth">
  <div class="auth-box">
    <h3>ASM GLOBAL AI</h3>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <!-- AUTH BUTTONS -->
    <button onclick="if(safeCall('login')) login()">Login</button>
    <button onclick="if(safeCall('signup')) signup()">Signup</button>

    <p id="msg"></p>
  </div>
</div>


<!-- =====================================================
   📂 SIDEBAR (MODES + CHAT LIST + PROFILE)
===================================================== -->
<div class="sidebar">

  <!-- 🔹 MODE SWITCH -->
  <button class="mode-btn active" onclick="setMode('asm', this)">Core AI</button>
  <button class="mode-btn" onclick="setMode('spiritlynk', this)">SpiritLynk</button>
  <button class="mode-btn" onclick="setMode('rgi', this)">RisingGem</button>
  <button class="mode-btn" onclick="setMode('finance', this)">Finance</button>

  <!-- 🔹 NEW CHAT -->
  <button onclick="newChat()">➕ New Chat</button>

  <!-- 🔹 SUB MODES -->
  <div id="subModes" style="margin-top:10px;"></div>

  <!-- 🔹 CHAT LIST -->
  <div id="chatList" class="chat-list"></div>


  <!-- =====================================================
     👤 PROFILE SECTION
  ===================================================== -->
  <div class="profile">

    <!-- PROFILE HEADER -->
    <div onclick="toggleProfileMenu()" style="display:flex;align-items:center;cursor:pointer;">
      <div style="width:36px;height:36px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;margin-right:10px;">
        <span id="avatarInitial">U</span>
      </div>
      <div id="userEmail">User</div>
    </div>

    <!-- PROFILE MENU -->
    <div id="profileMenu" class="profile-menu">

      <div onclick="addAccount()">➕ Add another account</div>
      <hr>

      <div onclick="upgradePlan()">⬆️ Upgrade plan</div>
      <div onclick="personalization()">🎨 Personalization</div>
      <div onclick="openProfile()">👤 Profile</div>
      <div onclick="openSettings()">⚙️ Settings</div>

      <hr>

      <div onclick="openHelp()">❓ Help</div>
      <div onclick="logout()">🚪 Log out</div>

    </div>

  </div>

</div>


<!-- =====================================================
   🧠 MAIN CHAT AREA
===================================================== -->
<div class="main">

  <!-- 🔹 TOP BAR -->
  <div class="topbar">
    <div>Kojo AI</div>
    <div id="modeLabel">Mode: asm</div>
  </div>

  <!-- 🔹 CHAT DISPLAY -->
  <div id="chat" class="chat"></div>


  <!-- =====================================================
     ⌨️ INPUT BOX (CRITICAL INTERACTION LAYER)
  ===================================================== -->
  <div class="inputBox">

    <!-- ➕ ATTACH -->
    <button onclick="toggleAttachMenu()" style="padding:10px;border-radius:6px;background:#1e293b;color:white;">+</button>

    <!-- ✍️ INPUT -->
    <input id="input" placeholder="Type a message...">

    <!-- 🎤 VOICE INPUT -->
    <button onclick="if(safeCall('startVoice')) startVoice()" style="padding:10px;border-radius:6px;background:#1e293b;color:white;">🎤</button>

    <!-- ⛔ STOP VOICE (FIXED) -->
    <button onclick="if(safeCall('stopSpeaking')) stopSpeaking()" style="padding:10px;border-radius:6px;background:#7f1d1d;color:white;">⛔</button>

    <!-- 📤 SEND -->
    <button onclick="if(safeCall('send')) send()">Send</button>

  </div>

</div>

<!-- ATTACH MENU -->
<div id="attachMenu" style="
  display:none;
  position:fixed;
  bottom:80px;
  left:300px;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  width:200px;
">
  <div onclick="triggerFile()">📎 Add photos & files</div>
  <div onclick="alert('Image generation later')">🖼 Create image</div>
</div>


<script>
/* =====================================================
   GLOBAL STATE (CORE SYSTEM VARIABLES)
===================================================== */

// 🔹 MODE SYSTEM
let mode = "asm";          // main mode (default safe)
let subMode = "general";   // sub layer

// 🔹 RGI LEVEL SYSTEM
let rgiLevel = "basic";

// 🔹 SPIRITLYNK SYSTEM
let spiritType = "counselling";

// 🔹 AUTH STATE
let isLoggedIn = false;

// 🔹 CHAT ENGINE
let chats = {};
let currentChatId = null;

function toggleProfileMenu() {
  const menu = document.getElementById("profileMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function setMode(newMode, el) {
  mode = newMode;

  subMode = "general";

  if (mode === "rgi") {
    rgiLevel = "basic";
  }

  if (mode === "spiritlynk") {
    spiritType = "counselling";
  }

  document.getElementById("modeLabel").innerText = "Mode: " + mode;

  document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
  if (el) el.classList.add("active");

  newChat();

  // ✅ FIX: render sub modes when mode changes
  renderSubModes();
}

/* =====================================================
   SUB MODE RENDER ENGINE
===================================================== */

function renderSubModes() {
  const container = document.getElementById("subModes");
  if (!container) return;

  container.innerHTML = "";

  // ✝️ SPIRITLYNK ONLY (FIRST PHASE)
  if (mode === "spiritlynk") {

    const items = ["counselling", "mentoring", "coaching", "prayer", "devotional"];

    items.forEach(type => {
      const btn = document.createElement("button");
      btn.innerText = type;
      btn.className = "mode-btn";
btn.style.fontSize = "12px";
btn.style.padding = "6px";
btn.style.background = "#334155";

      btn.onclick = () => {
        subMode = type;
        console.log("SpiritLynk Mode:", type);
      };

      container.appendChild(btn);
    });
  }
}
function newChat() {
  const id = Date.now();
  if (!chats[mode]) chats[mode] = {};
  chats[mode][id] = { messages: [], title: null };
  currentChatId = id;

  renderChat();
  loadChatList();
}

function loadChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  if (!chats[mode]) return;

  Object.keys(chats[mode]).forEach(id => {
    const chat = chats[mode][id];

    const div = document.createElement("div");
    div.className = "chat-item";

    const title = document.createElement("div");
    title.className = "chat-title";
    title.innerText = chat.title || "New Chat";

    title.onclick = () => {
      currentChatId = id;
      renderChat();
    };

    const actions = document.createElement("div");

    const rename = document.createElement("button");
    rename.innerText = "✏️";
    rename.onclick = () => {
      const name = prompt("Rename chat:");
      if (name) {
        chat.title = name;
        loadChatList();
      }
    };

    const del = document.createElement("button");
    del.innerText = "🗑";
    del.onclick = () => {
      if (confirm("Delete chat?")) {
        delete chats[mode][id];
        currentChatId = null;
        renderChat();
        loadChatList();
      }
    };

    actions.appendChild(rename);
    actions.appendChild(del);

    div.appendChild(title);
    div.appendChild(actions);

    list.appendChild(div);
  });
}

function renderChat() {
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  if (!currentChatId) return;

  const messages = chats[mode][currentChatId].messages;

  messages.forEach(m => {
    const wrapper = document.createElement("div");
wrapper.className = "msg " + m.role;

const bubble = document.createElement("div");
bubble.className = "bubble";
bubble.textContent = m.text;

wrapper.appendChild(bubble);
chatDiv.appendChild(wrapper);
  });
}

async function send() {
  try {
    const input = document.getElementById("input");
    let text = input.value.trim();

    if (!isLoggedIn) return alert("Login first");
    if (!text) return;

    if (!currentChatId) newChat();

    const chat = chats[mode][currentChatId];

    chat.messages.push({ role:"user", text });

    if (!chat.title) {
      chat.title = text.substring(0, 30);
    }

    renderChat();
    loadChatList();

    input.value = "";

    const res = await fetch("/chat", {
      method:"POST",
      credentials:"include",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        message: text,
        mode: mode,
        subMode: subMode,
        rgiLevel: rgiLevel,
        spiritType: spiritType
      })
    });

    const data = await res.json();

    const replyText = data.reply || data.error || "No response";

    chat.messages.push({
      role:"ai",
      text: replyText
    });

    speak(replyText);

    renderChat();

  } catch (err) {
    console.error("SEND ERROR:", err);
    alert("Something went wrong");
  }
}

async function login() {
  const res = await fetch("/login", {
    method:"POST",
    credentials:"include",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("auth").style.display = "none";
    checkAuth();
  } else {
    msg.innerText = data.error;
  }
}

async function signup() {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("msg");

    const res = await fetch("/signup", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    msg.innerText = data.success ? "Signup successful" : data.error;

  } catch (err) {
    console.error("SIGNUP ERROR:", err);
    alert("Signup failed");
  }
}

async function checkAuth() {
  const res = await fetch("/me", { credentials:"include" });
  const data = await res.json();

  isLoggedIn = data.loggedIn;

  if (!data.loggedIn) {
    document.getElementById("auth").style.display = "flex";
    return;
  }

  document.getElementById("auth").style.display = "none";
  // fetch profile also
const profileRes = await fetch("/profile", { credentials:"include" });
const profile = await profileRes.json();

const displayName = profile.name || data.email;

// ✅ SHOW ONLY ONE LINE
document.getElementById("userEmail").innerText = displayName;

// ✅ AVATAR USE NAME FIRST
document.getElementById("avatarInitial").innerText =
  displayName.charAt(0).toUpperCase();
}

async function logout() {
  await fetch("/logout", { method:"POST", credentials:"include" });
  location.reload();
}
function toggleAttachMenu() {
  const menu = document.getElementById("attachMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function triggerFile() {
  document.getElementById("fileInput").click();
}
function startVoice() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Voice not supported on this browser");
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
  };

  recognition.start();
}
function addAccount() {
  alert("Multi-account feature coming soon");
}

function upgradePlan() {
  alert("Upgrade system coming soon");
}

function personalization() {
  document.body.style.background = "#020617";
  alert("Dark theme activated");
}

async function openProfile() {
  const res = await fetch("/profile", { credentials:"include" });
  const data = await res.json();

  const name = prompt("Enter your name:", data.name || "");

  if (name !== null) {
    await fetch("/profile/update", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      credentials:"include",
      body: JSON.stringify({ name })
    });

    alert("Profile updated");

    // ✅ THIS WAS MISSING
    checkAuth();
  }
}

function openSettings() {
  alert("Settings panel coming soon");
}

function openHelp() {
  alert("Help center coming soon");
}
checkAuth();

// ✅ INITIAL UI RENDER
console.log("Rendering subModes for:", mode);
renderSubModes();

// 🔊 KOJO VOICE ENGINE
let currentSpeech = null;

function speak(text) {
  if (!("speechSynthesis" in window)) return;

  stopSpeaking();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.9;
  utterance.pitch = 1;
  utterance.lang = "en-US";

  currentSpeech = utterance;
  speechSynthesis.speak(utterance);
}

function stopSpeaking() {
  if (speechSynthesis.speaking) {
    speechSynthesis.cancel();
  }
}

// 🔐 FUNCTION SAFETY GUARD
function ensureFunctionExists(name) {
  if (typeof window[name] !== "function") {
    console.error(name + " is missing");
    alert("System error: " + name + " not loaded");
  }
}

function safeCall(fnName) {
  if (typeof window[fnName] !== "function") {
    alert("System error: " + fnName + " not available");
    console.error(fnName + " is not defined");
    return false;
  }
  return true;
}
</script>

</body>
</html>
