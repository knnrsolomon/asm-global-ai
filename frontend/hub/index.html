<!DOCTYPE html>
<html>
<head>
  <title id="dynamicTitle">Loading...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    header {
      display:flex;
      justify-content:space-between;
      padding:15px;
      background:#020617;
    }

    .apps {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap:20px;
      padding:30px;
    }

    .card {
      background:#1e293b;
      padding:20px;
      border-radius:10px;
      cursor:pointer;
      transition:0.2s;
    }

    .card:hover {
      background:#334155;
    }

    #chatBox {
      display:none;
      padding:20px;
    }

    #messages {
      height:300px;
      overflow:auto;
      background:#020617;
      padding:10px;
      border-radius:10px;
    }

    input, button {
      padding:10px;
      margin-top:10px;
    }

    #auth {
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:#0f172a;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <h2>ASM GLOBAL AI HUB</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
  <p id="msg"></p>
</div>

<header>
  <!-- 🔥 FIX: give ID -->
  <div id="title">ASM GLOBAL AI HUB</div>
  <div>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<!-- LANDING PAGE -->
<div class="apps" id="apps">

  <div class="card" onclick="go('http://ai.asmglobal.cloud')">
    <h3>Core AI</h3>
    <p>General assistant</p>
  </div>

  <div class="card" onclick="go('http://spiritlynk.asmglobal.cloud')">
    <h3>SpiritLynk AI</h3>
    <p>Spiritual growth, purpose, destiny</p>
  </div>

  <div class="card" onclick="go('http://rgi.asmglobal.cloud')">
    <h3>RisingGem AI</h3>
    <p>Learning, teaching, mentorship</p>
  </div>

  <div class="card" onclick="go('http://finai.asmglobal.cloud')">
    <h3>Finance AI</h3>
    <p>Money, insights, analytics</p>
  </div>

</div>

<!-- CHAT -->
<div id="chatBox">
  <div id="messages"></div>
  <input id="input" placeholder="Type message..." style="width:80%">
  <button onclick="send()">Send</button>
</div>

<script>

// ================= NAV =================
function go(url){
  window.location.href = url;
}

// ================= BRANDING =================
function applyBranding() {
  const host = window.location.hostname;

  let title = "ASM GLOBAL AI HUB";

  if (host.includes("spiritlynk")) title = "SpiritLynk AI";
  else if (host.includes("rgi")) title = "RisingGem AI";
  else if (host.includes("finai")) title = "Finance AI";

  // 🔥 FORCE UPDATE TITLE (STRONG METHOD)
  const titleTag = document.getElementById("dynamicTitle");
  if (titleTag) titleTag.innerText = title;

  document.title = title;

  // Header update
  document.getElementById("title").innerText = title;
}

// ================= AUTH =================
async function checkAuth(){
  const res = await fetch("/me", { credentials:"include" });
  const d = await res.json();

  if(d.loggedIn){
    document.getElementById("auth").style.display = "none";
  }
}

async function login(){
  const res = await fetch("/login", {
    method:"POST",
    credentials:"include",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const d = await res.json();

  if(d.success){
    applyBranding();
    checkAuth();
  } else {
    msg.innerText = d.error;
  }
}

async function signup(){
  const res = await fetch("/signup", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  });

  const d = await res.json();
  msg.innerText = d.success ? "Signup successful" : d.error;
}

async function logout(){
  await fetch("/logout", { method:"POST", credentials:"include" });
  location.reload();
}

// ================= CHAT =================
async function send(){
  const text = input.value;
  input.value = "";

  messages.innerHTML += `<div><b>You:</b> ${text}</div>`;

  const res = await fetch("/chat", {
    method:"POST",
    credentials:"include",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ message:text })
  });

  const data = await res.json();

  if(data.error){
    messages.innerHTML += `<div style="color:red">${data.error}</div>`;
  } else {
    messages.innerHTML += `<div><b>AI:</b> ${data.reply}</div>`;
  }

  messages.scrollTop = messages.scrollHeight;
}

// ================= INIT =================
window.onload = () => {
  applyBranding();   // 🔥 GUARANTEED RUN
  checkAuth();
};

</script>

</body>
</html>
