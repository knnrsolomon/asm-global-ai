<!DOCTYPE html>
<html>
<head>
  <title>ASM Global AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      display:flex;
      height:100vh;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    .sidebar {
      width:260px;
      background:#020617;
      padding:15px;
      display:flex;
      flex-direction:column;
    }

    .mode-btn {
      padding:10px;
      margin-bottom:8px;
      border:none;
      background:#1e293b;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    .mode-btn.active {
      background:#3b82f6;
    }

    .chat-list {
      flex:1;
      margin-top:10px;
      overflow:auto;
    }

    .chat-item {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:8px;
      border-radius:6px;
      margin-bottom:5px;
      background:#020617;
    }

    .chat-item:hover {
      background:#1e293b;
    }

    .chat-title {
      flex:1;
      cursor:pointer;
    }

    .actions button {
      margin-left:5px;
      background:none;
      border:none;
      color:white;
      cursor:pointer;
    }

    .profile {
      margin-top:auto;
      position:relative;
    }

    .profile-menu {
      display:none;
      position:absolute;
      bottom:60px;
      left:0;
      width:220px;
      background:white;
      color:black;
      border-radius:12px;
      padding:10px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .topbar {
      padding:15px;
      background:#020617;
      display:flex;
      justify-content:space-between;
    }

    .chat {
      flex:1;
      padding:20px;
      overflow:auto;
    }

    .msg {
      display:flex;
      margin-bottom:10px;
    }

    .msg.user { justify-content:flex-end; }

    .bubble {
      max-width:60%;
      padding:10px;
      border-radius:12px;
    }

    .user .bubble { background:#3b82f6; }
    .ai .bubble { background:#1e293b; }

    .inputBox {
      padding:15px;
      display:flex;
      gap:10px;
      background:#020617;
    }

    input {
      flex:1;
      padding:10px;
      border:none;
      border-radius:6px;
    }

    #auth {
      position:fixed;
      inset:0;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .auth-box {
      background:#020617;
      padding:30px;
      border-radius:10px;
      width:300px;
      text-align:center;
    }

    .auth-box input {
      width:100%;
      margin:10px 0;
      padding:10px;
      border-radius:6px;
      border:none;
    }

    .auth-box button {
      width:100%;
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:6px;
      background:#3b82f6;
      color:white;
    }
  </style>
</head>

<body>

<div id="auth">
  <div class="auth-box">
    <h3>ASM GLOBAL AI</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
    <p id="msg"></p>
  </div>
</div>

<div class="sidebar">

  <button class="mode-btn active" onclick="setMode('asm', this)">Core AI</button>
  <button class="mode-btn" onclick="setMode('spiritlynk', this)">SpiritLynk</button>
  <button class="mode-btn" onclick="setMode('rgi', this)">RisingGem</button>
  <button class="mode-btn" onclick="setMode('finance', this)">Finance</button>

  <button onclick="newChat()">➕ New Chat</button>
<button onclick="toggleImageLibrary()">🖼 Images</button>

<div id="imageLibrary" style="
  display:none;
  margin-top:10px;
  overflow:auto;
  max-height:200px;
"></div>
  <div id="chatList" class="chat-list"></div>

  <!-- PROFILE -->
  <div class="profile">

    <div onclick="toggleProfileMenu()" style="display:flex;align-items:center;cursor:pointer;">
      <div style="width:36px;height:36px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;margin-right:10px;">
        <span id="avatarInitial">U</span>
      </div>
      <div id="userEmail">User</div>
    </div>

    <div id="profileMenu" class="profile-menu">

  <div onclick="addAccount()">➕ Add another account</div>
  <hr>

  <div onclick="upgradePlan()">⬆️ Upgrade plan</div>
  <div onclick="personalization()">🎨 Personalization</div>
  <div onclick="openProfile()">👤 Profile</div>
  <div onclick="openSettings()">⚙️ Settings</div>

  <hr>

  <div onclick="openHelp()">❓ Help</div>
  <div onclick="logout()">🚪 Log out</div>

</div>

  </div>

</div>

<div class="main">

  <div class="topbar">
    <div>Kojo AI</div>
    <div id="modeLabel">Mode: asm</div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="inputBox">

  <!-- + BUTTON -->
  <button onclick="toggleAttachMenu()" style="padding:10px;border-radius:6px;background:#1e293b;color:white;">+</button>

  <!-- HIDDEN FILE INPUT -->
  <input type="file" id="fileInput" style="display:none">

  <!-- TEXT -->
  <input id="input" placeholder="Type a message...">

  <!-- MIC -->
  <button onclick="startVoice()" style="padding:10px;border-radius:6px;background:#1e293b;color:white;">🎤</button>
<button onclick="toggleImageMode()" id="imageModeBtn"
  style="padding:10px;border-radius:6px;background:#1e293b;color:white;">
  🖼
</button>
  <!-- SEND -->
  <button onclick="send()">Send</button>

</div>

<!-- ATTACH MENU -->
<div id="attachMenu" style="
  display:none;
  position:fixed;
  bottom:80px;
  left:300px;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  width:200px;
">
  <div onclick="triggerFile()">📎 Add photos & files</div>
  <div onclick="activateImageMode()">🖼 Create image</div>
</div>

</div>

<script>

let isLoggedIn = false;
let mode = "asm";
let imageMode = false;
let chats = {};
let currentChatId = null;

function toggleProfileMenu() {
  const menu = document.getElementById("profileMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function setMode(m, el) {
  mode = m;
  document.getElementById("modeLabel").innerText = "Mode: " + m;

  document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");

  // 🔥 ONLY switch if chats already exist
  if (chats[mode] && Object.keys(chats[mode]).length > 0) {
    currentChatId = Object.keys(chats[mode])[0];
    renderChat();
    loadChatList();
  } else {
    // ❌ DO NOT auto-create chat here
    console.log("No chats yet for mode:", mode);
  }
}

async function newChat() {
  if (!isLoggedIn) return alert("Login first");

  try {
    const res = await fetch("/api/chat/create", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ mode })
    });

    const data = await res.json();
console.log("IMAGE RESPONSE:", data);
    const id = data.chatId;

    currentChatId = id;

// 🔥 Immediately load messages from DB
await loadMessages(id);

// 🔥 Reload chat list from DB
await initApp();

    currentChatId = id;

    renderChat();
    loadChatList();

  } catch (err) {
    console.error("New chat error:", err);
  }
} 

function loadChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  if (!chats[mode]) return;

  Object.keys(chats[mode]).forEach(id => {
    const chat = chats[mode][id];

    const div = document.createElement("div");
    div.className = "chat-item";

    const title = document.createElement("div");
    title.className = "chat-title";
    title.innerText = chat.title || "New Chat";

    title.dataset.id = id;

title.onclick = () => {
  setActiveChat(id);
};

    const actions = document.createElement("div");

    const rename = document.createElement("button");
    rename.innerText = "✏️";
    rename.onclick = () => {
      const name = prompt("Rename chat:");
      if (name) {
        chat.title = name;
        loadChatList();
      }
    };

    const del = document.createElement("button");
    del.innerText = "🗑";
    del.onclick = () => {
      if (confirm("Delete chat?")) {
        delete chats[mode][id];
        currentChatId = null;
        renderChat();
        loadChatList();
      }
    };

    actions.appendChild(rename);
    actions.appendChild(del);

    div.appendChild(title);
    div.appendChild(actions);

    list.appendChild(div);
  });
}

function renderChat() {
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  if (!currentChatId) return;

  const messages = chats[mode][currentChatId].messages;

  messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    // container
    const wrapper = document.createElement("div");
    wrapper.style.display = "flex";
    wrapper.style.flexDirection = "column";
    wrapper.style.gap = "6px";

    // message content
    const content = document.createElement("div");
    
// 🔥 HANDLE IMAGE
if (m.text.startsWith("IMAGE::")) {
  const url = m.text.replace("IMAGE::", "");

  content.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px;">
      <img src="${url}" style="max-width:250px;border-radius:10px;">
      <button onclick="downloadImage('${url}')"
        style="padding:6px;border:none;border-radius:6px;background:#3b82f6;color:white;cursor:pointer;">
        Download
      </button>
    </div>
  `;
} else {
  // 🔥 NORMAL TEXT + VOICE BUTTON
  content.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div class="ai-text">${m.text}</div>
      <button class="play-btn"
        style="padding:4px;border:none;border-radius:6px;background:#10b981;color:white;cursor:pointer;font-size:12px;">
        🔊 Play
      </button>
    </div>
  `;
}

    // copy button
    const copyBtn = document.createElement("button");
    copyBtn.innerText = "📋 Copy";
    copyBtn.style.fontSize = "11px";
    copyBtn.style.background = "#334155";
    copyBtn.style.color = "white";
    copyBtn.style.border = "none";
    copyBtn.style.borderRadius = "6px";
    copyBtn.style.padding = "4px";
    copyBtn.style.cursor = "pointer";

    copyBtn.onclick = () => {
  const temp = document.createElement("div");
  temp.innerHTML = m.text;

  copyText(temp.innerText);

  // 🔥 user feedback
  copyBtn.innerText = "✅ Copied";

  setTimeout(() => {
    copyBtn.innerText = "📋 Copy";
  }, 1000);
};

    wrapper.appendChild(content);
    wrapper.appendChild(copyBtn);

    bubble.appendChild(wrapper);
    div.appendChild(bubble);
    chatDiv.appendChild(div);
  });

  // 🔥 attach voice button handlers safely
  setTimeout(() => {
    document.querySelectorAll(".play-btn").forEach(btn => {
      btn.onclick = () => {
        const text = btn.parentElement.querySelector(".ai-text")?.innerText;
        if (text) playVoice(text);
      };
    });
  }, 0);
}

 async function send() {
  const input = document.getElementById("input");
  let text = input.value.trim();

  if (!isLoggedIn) return alert("Login first");
  if (!text) return;

  if (!currentChatId) {
  await newChat();

  // 🔥 SAFETY CHECK (VERY IMPORTANT)
  if (!currentChatId || !chats[mode][currentChatId]) {
    console.error("Chat not ready");
    return;
  }
}

  

// 🔥 SAVE TO DATABASE
await fetch("/api/chat/message", {
  method: "POST",
  credentials: "include",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    chatId: currentChatId,
    role: "user",
    content: text
  })
});

  if (!chat.title) {
    chat.title = text.substring(0, 30);
  }

  renderChat();
  loadChatList();

  input.value = "";

  try {

    // ✅ IMAGE MODE
    if (imageMode) {

      const res = await fetch("/api/generate-image", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: text })
      });

      const data = await res.json();

      // 🔥 SAVE IMAGE TO DATABASE (REPLACES LOCAL UI PUSH)
await fetch("/api/chat/message", {
  method: "POST",
  credentials: "include",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    chatId: currentChatId,
    role: "assistant",
    content: "IMAGE::" + data.imageUrl
  })
});


     // reset image mode
      imageMode = false;

      const btn = document.getElementById("imageModeBtn");
      btn.innerText = "🖼";
      btn.style.background = "#1e293b";

    } else {

      // ✅ NORMAL CHAT
      const res = await fetch("/chat", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: text,
          mode: mode
        })
      });

      const data = await res.json();

    const replyText = data.reply || data.error || "No response";

// 🔥 SAVE AI TEXT RESPONSE TO DATABASE
await fetch("/api/chat/message", {
  method: "POST",
  credentials: "include",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    chatId: currentChatId,
    role: "assistant",
    content: replyText
  })
});

    }

  } catch (err) {
    console.error(err);
    chat.messages.push({
      role: "ai",
      text: "⚠️ Error processing request"
    });
  }

  await initApp();
} 

async function login() {
  const res = await fetch("/login", {
    method:"POST",
    credentials:"include",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.success) {
  // 🔥 FORCE CLEAN RELOAD (VERY IMPORTANT)
  location.reload();

} else {
  msg.innerText = data.error;
}
}

async function signup() {
  const res = await fetch("/signup", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  msg.innerText = data.success ? "Signup successful" : data.error;
}

async function checkAuth() {
  const res = await fetch("/me", { credentials:"include" });
  const data = await res.json();

  isLoggedIn = data.loggedIn;

  if (!data.loggedIn) {
    document.getElementById("auth").style.display = "flex";
    return;
  }

  document.getElementById("auth").style.display = "none";

  // fetch profile
  const profileRes = await fetch("/profile", { credentials:"include" });
  const profile = await profileRes.json();

  const displayName = profile.name || data.email;

  document.getElementById("userEmail").innerText = displayName;

  document.getElementById("avatarInitial").innerText =
    displayName.charAt(0).toUpperCase();
}

async function logout() {
  await fetch("/logout", { method:"POST", credentials:"include" });
  location.reload();
}
function toggleAttachMenu() {
  const menu = document.getElementById("attachMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function triggerFile() {
  document.getElementById("fileInput").click();
}
function startVoice() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Voice not supported on this browser");
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
  };

  recognition.start();
}
function addAccount() {
  alert("Multi-account feature coming soon");
}

function upgradePlan() {
  alert("Upgrade system coming soon");
}

function personalization() {
  document.body.style.background = "#020617";
  alert("Dark theme activated");
}

async function openProfile() {
  const res = await fetch("/profile", { credentials:"include" });
  const data = await res.json();

  const name = prompt("Enter your name:", data.name || "");

  if (name !== null) {
    await fetch("/profile/update", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      credentials:"include",
      body: JSON.stringify({ name })
    });

    alert("Profile updated");

    // ✅ THIS WAS MISSING
    checkAuth();
  }
}

function openSettings() {
  alert("Settings panel coming soon");
}

function openHelp() {
  alert("Help center coming soon");
}
function downloadImage(url) {
  const a = document.createElement("a");
  a.href = url;
  a.download = "kojo-image.png";
  a.click();
}
function toggleImageMode() {
  imageMode = !imageMode;

  const btn = document.getElementById("imageModeBtn");

  if (imageMode) {
    btn.style.background = "#f59e0b"; // orange
    btn.innerText = "🖼 ON";
  } else {
    btn.style.background = "#1e293b";
    btn.innerText = "🖼";
  }
}
function activateImageMode() {
  imageMode = true;

  const btn = document.getElementById("imageModeBtn");
  btn.style.background = "#f59e0b";
  btn.innerText = "🖼 ON";

  document.getElementById("input").focus();
}
async function playVoice(text) {
  try {
    const res = await fetch("/api/voice", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text })
    });

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);

    const audio = new Audio(url);
    audio.play();

  } catch (err) {
    console.error("Voice error:", err);
  }
}

function copyText(text) {
  // try modern API first
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      console.log("Copied");
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

// fallback for HTTP / older browsers
function fallbackCopy(text) {
  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";

  document.body.appendChild(textarea);
  textarea.select();

  try {
    document.execCommand("copy");
    console.log("Copied (fallback)");
  } catch (err) {
    console.error("Copy failed", err);
  }

  document.body.removeChild(textarea);
}

async function initApp() {
  await checkAuth();

  if (!isLoggedIn) return;

  try {
    const res = await fetch("/api/chats", {
      credentials: "include"
    });

    const dbChats = await res.json();

    // 🔥 RESET FULL STATE (NOT MODE ONLY)
    chats = {};

    // 🔥 BUILD FROM DATABASE ONLY
    for (const chat of dbChats) {
      const chatId = chat.id;
      // 🔥 FORCE ALL CHATS INTO CURRENT MODE (TEMP FIX)
const chatMode = mode;

if (!chats[chatMode]) chats[chatMode] = {};

chats[chatMode][chatId] = {
        title: "Chat",
        messages: []
      };

      try {
        const msgRes = await fetch(`/api/messages/${chatId}`, {
          credentials: "include"
        });

        const messages = await msgRes.json();

        chats[chatMode][chatId].messages = messages.map(m => ({
          role: m.role === "assistant" ? "ai" : m.role,
          text: m.content
        }));

      } catch (err) {
        console.error("Message load error:", err);
      }
    }

    // 🔥 HANDLE EMPTY DATABASE (IMPORTANT)
    if (!chats[mode] || Object.keys(chats[mode]).length === 0) {
      await newChat();
      return;
    }

    // 🔥 RESTORE LAST CHAT SAFELY
    const savedChatId = localStorage.getItem("activeChatId");

    if (savedChatId && chats[mode] && chats[mode][savedChatId]) {
      currentChatId = savedChatId;
    } else {
      currentChatId = Object.keys(chats[mode])[0];
    }

    renderChat();
    loadChatList();

  } catch (err) {
    console.error("Chat load error:", err);
  }
}

    
// 🔥 SAVE ACTIVE CHAT WHEN SWITCHING
function setActiveChat(id) {
  currentChatId = id;
  localStorage.setItem("activeChatId", id);
  renderChat();
}

// 🔁 PATCH CLICK HANDLER (VERY IMPORTANT)
function overrideChatClicks() {
  document.querySelectorAll(".chat-title").forEach(el => {
    el.onclick = () => {
      const id = el.dataset.id;
      setActiveChat(id);
    };
  });
}

function toggleImageLibrary() {
  const box = document.getElementById("imageLibrary");

  if (box.style.display === "block") {
    box.style.display = "none";
    return;
  }

  box.style.display = "block";
  loadImageLibrary();
}

async function loadImageLibrary() {
  const box = document.getElementById("imageLibrary");
  box.innerHTML = "Loading...";

  try {
    const res = await fetch("/api/chats", {
      credentials: "include"
    });

    const chats = await res.json();

    box.innerHTML = "";

    for (const chat of chats) {
      const msgRes = await fetch(`/api/messages/${chat.id}`, {
        credentials: "include"
      });

      const messages = await msgRes.json();

      messages.forEach(m => {
        if (m.content && m.content.startsWith("IMAGE::")) {
          const url = m.content.replace("IMAGE::", "");

          const wrapper = document.createElement("div");

const img = document.createElement("img");
img.src = url;
img.style.width = "100%";
img.style.borderRadius = "8px";

const btn = document.createElement("button");
btn.innerText = "Download";
btn.style.marginBottom = "10px";
btn.onclick = () => downloadImage(url);

wrapper.appendChild(img);
wrapper.appendChild(btn);

box.appendChild(wrapper);
        }
      });
    }

  } catch (err) {
    box.innerHTML = "Failed to load images";
    console.error(err);
  }
}

// 🚀 START
initApp();

</script>

</body>
</html>
