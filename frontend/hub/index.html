<!DOCTYPE html>
<html>
<head>
  <title>ASM Global AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      display:flex;
      height:100vh;
      font-family: Arial;
      background:#0f172a;
      color:white;
    }

    .sidebar {
      width:260px;
      background:#020617;
      padding:15px;
      display:flex;
      flex-direction:column;
    }

    .mode-btn {
      padding:10px;
      margin-bottom:8px;
      border:none;
      background:#1e293b;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    .mode-btn.active {
      background:#3b82f6;
    }

    .chat-list {
      flex:1;
      margin-top:10px;
      overflow:auto;
    }

    .chat-item {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:8px;
      border-radius:6px;
      margin-bottom:5px;
      background:#020617;
    }

    .chat-item:hover {
      background:#1e293b;
    }

    .chat-title {
      flex:1;
      cursor:pointer;
    }

    .actions button {
      margin-left:5px;
      background:none;
      border:none;
      color:white;
      cursor:pointer;
    }

    .profile {
      margin-top:auto;
      position:relative;
    }

    .profile-menu {
      display:none;
      position:absolute;
      bottom:60px;
      left:0;
      width:220px;
      background:white;
      color:black;
      border-radius:12px;
      padding:10px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .topbar {
      padding:15px;
      background:#020617;
      display:flex;
      justify-content:space-between;
    }

    .chat {
      flex:1;
      padding:20px;
      overflow:auto;
    }

    .msg {
      display:flex;
      margin-bottom:10px;
    }

    .msg.user { justify-content:flex-end; }

    .bubble {
      max-width:60%;
      padding:10px;
      border-radius:12px;
    }

    .user .bubble { background:#3b82f6; }
    .ai .bubble { background:#1e293b; }

    .inputBox {
      padding:15px;
      display:flex;
      gap:10px;
      background:#020617;
    }

    input {
      flex:1;
      padding:10px;
      border:none;
      border-radius:6px;
    }

    #auth {
      position:fixed;
      inset:0;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .auth-box {
      background:#020617;
      padding:30px;
      border-radius:10px;
      width:300px;
      text-align:center;
    }

    .auth-box input {
      width:100%;
      margin:10px 0;
      padding:10px;
      border-radius:6px;
      border:none;
    }

    .auth-box button {
      width:100%;
      margin-top:10px;
      padding:10px;
      border:none;
      border-radius:6px;
      background:#3b82f6;
      color:white;
    }
  </style>
</head>

<body>

<div id="auth">
  <div class="auth-box">
    <h3>ASM GLOBAL AI</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
    <p id="msg"></p>
  </div>
</div>

<div class="sidebar">

  <button class="mode-btn active" onclick="setMode('asm', this)">Core AI</button>
  <button class="mode-btn" onclick="setMode('spiritlynk', this)">SpiritLynk</button>
  <button class="mode-btn" onclick="setMode('rgi', this)">RisingGem</button>
  <button class="mode-btn" onclick="setMode('finance', this)">Finance</button>

  <button onclick="newChat()">➕ New Chat</button>

  <div id="chatList" class="chat-list"></div>

  <!-- PROFILE -->
  <div class="profile">

    <div onclick="toggleProfileMenu()" style="display:flex;align-items:center;cursor:pointer;">
      <div style="width:36px;height:36px;border-radius:50%;background:#3b82f6;display:flex;align-items:center;justify-content:center;margin-right:10px;">
        <span id="avatarInitial">U</span>
      </div>
      <div id="userEmail">User</div>
    </div>

    <div id="profileMenu" class="profile-menu">

  <div onclick="addAccount()">➕ Add another account</div>
  <hr>

  <div onclick="upgradePlan()">⬆️ Upgrade plan</div>
  <div onclick="personalization()">🎨 Personalization</div>
  <div onclick="openProfile()">👤 Profile</div>
  <div onclick="openSettings()">⚙️ Settings</div>

  <hr>

  <div onclick="openHelp()">❓ Help</div>
  <div onclick="logout()">🚪 Log out</div>

</div>

  </div>

</div>

<div class="main">

  <div class="topbar">
    <div>Kojo AI</div>
    <div id="modeLabel">Mode: asm</div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="inputBox">

  <!-- + BUTTON -->
  <button onclick="toggleAttachMenu()" style="padding:10px;border-radius:6px;background:#1e293b;color:white;">+</button>

  <!-- HIDDEN FILE INPUT -->
  <input type="file" id="fileInput" style="display:none">

  <!-- TEXT -->
  <input id="input" placeholder="Type a message...">

  <!-- MIC -->
  <button onclick="startVoice()" style="padding:10px;border-radius:6px;background:#1e293b;color:white;">🎤</button>
<button onclick="toggleImageMode()" id="imageModeBtn"
  style="padding:10px;border-radius:6px;background:#1e293b;color:white;">
  🖼
</button>
  <!-- SEND -->
  <button onclick="send()">Send</button>

</div>

<!-- ATTACH MENU -->
<div id="attachMenu" style="
  display:none;
  position:fixed;
  bottom:80px;
  left:300px;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  width:200px;
">
  <div onclick="triggerFile()">📎 Add photos & files</div>
  <div onclick="activateImageMode()">🖼 Create image</div>
</div>

</div>

<script>

let isLoggedIn = false;
let mode = "asm";
let imageMode = false;
let chats = {};
let currentChatId = null;

function toggleProfileMenu() {
  const menu = document.getElementById("profileMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function setMode(m, el) {
  mode = m;
  document.getElementById("modeLabel").innerText = "Mode: " + m;

  document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
  el.classList.add("active");

  if (!chats[mode] || Object.keys(chats[mode]).length === 0) {
    newChat();
  } else {
    currentChatId = Object.keys(chats[mode])[0];
    renderChat();
    loadChatList();
  }
}

function newChat() {
  const id = Date.now();
  if (!chats[mode]) chats[mode] = {};
  chats[mode][id] = { messages: [], title: null };
  currentChatId = id;

  renderChat();
  loadChatList();
}

function loadChatList() {
  const list = document.getElementById("chatList");
  list.innerHTML = "";

  if (!chats[mode]) return;

  Object.keys(chats[mode]).forEach(id => {
    const chat = chats[mode][id];

    const div = document.createElement("div");
    div.className = "chat-item";

    const title = document.createElement("div");
    title.className = "chat-title";
    title.innerText = chat.title || "New Chat";

    title.onclick = () => {
      currentChatId = id;
      renderChat();
    };

    const actions = document.createElement("div");

    const rename = document.createElement("button");
    rename.innerText = "✏️";
    rename.onclick = () => {
      const name = prompt("Rename chat:");
      if (name) {
        chat.title = name;
        loadChatList();
      }
    };

    const del = document.createElement("button");
    del.innerText = "🗑";
    del.onclick = () => {
      if (confirm("Delete chat?")) {
        delete chats[mode][id];
        currentChatId = null;
        renderChat();
        loadChatList();
      }
    };

    actions.appendChild(rename);
    actions.appendChild(del);

    div.appendChild(title);
    div.appendChild(actions);

    list.appendChild(div);
  });
}

function renderChat() {
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = "";

  if (!currentChatId) return;

  const messages = chats[mode][currentChatId].messages;

  messages.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    // 🔥 ALLOW HTML (for images)
    bubble.innerHTML = m.text;

    div.appendChild(bubble);
    chatDiv.appendChild(div);
  });
}

 async function send() {
  const input = document.getElementById("input");
  let text = input.value.trim();

  if (!isLoggedIn) return alert("Login first");
  if (!text) return;

  if (!currentChatId) newChat();

  const chat = chats[mode][currentChatId];

  // Save user message
  chat.messages.push({ role: "user", text });

  if (!chat.title) {
    chat.title = text.substring(0, 30);
  }

  renderChat();
  loadChatList();

  input.value = "";

  try {

    // ✅ IMAGE MODE
    if (imageMode) {

      const res = await fetch("/api/generate-image", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: text })
      });

      const data = await res.json();

      chat.messages.push({
        role: "ai",
        text: `
          <div style="display:flex;flex-direction:column;gap:8px;">
            <img src="${data.imageUrl}" style="max-width:250px;border-radius:10px;">
            <button onclick="downloadImage('${data.imageUrl}')"
              style="padding:6px;border:none;border-radius:6px;background:#3b82f6;color:white;cursor:pointer;">
              Download
            </button>
          </div>
        `
      });

      // reset image mode
      imageMode = false;

      const btn = document.getElementById("imageModeBtn");
      btn.innerText = "🖼";
      btn.style.background = "#1e293b";

    } else {

      // ✅ NORMAL CHAT
      const res = await fetch("/chat", {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: text,
          mode: mode
        })
      });

      const data = await res.json();

      chat.messages.push({
        role: "ai",
        text: data.reply || data.error || "No response"
      });
    }

  } catch (err) {
    console.error(err);
    chat.messages.push({
      role: "ai",
      text: "⚠️ Error processing request"
    });
  }

  renderChat();
} 

async function login() {
  const res = await fetch("/login", {
    method:"POST",
    credentials:"include",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("auth").style.display = "none";
    checkAuth();
  } else {
    msg.innerText = data.error;
  }
}

async function signup() {
  const res = await fetch("/signup", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  msg.innerText = data.success ? "Signup successful" : data.error;
}

async function checkAuth() {
  const res = await fetch("/me", { credentials:"include" });
  const data = await res.json();

  isLoggedIn = data.loggedIn;

  if (!data.loggedIn) {
    document.getElementById("auth").style.display = "flex";
    return;
  }

  document.getElementById("auth").style.display = "none";
  // fetch profile also
const profileRes = await fetch("/profile", { credentials:"include" });
const profile = await profileRes.json();

const displayName = profile.name || data.email;

// ✅ SHOW ONLY ONE LINE
document.getElementById("userEmail").innerText = displayName;

// ✅ AVATAR USE NAME FIRST
document.getElementById("avatarInitial").innerText =
  displayName.charAt(0).toUpperCase();
}

async function logout() {
  await fetch("/logout", { method:"POST", credentials:"include" });
  location.reload();
}
function toggleAttachMenu() {
  const menu = document.getElementById("attachMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function triggerFile() {
  document.getElementById("fileInput").click();
}
function startVoice() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Voice not supported on this browser");
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.lang = "en-US";

  recognition.onresult = function(event) {
    const text = event.results[0][0].transcript;
    document.getElementById("input").value = text;
  };

  recognition.start();
}
function addAccount() {
  alert("Multi-account feature coming soon");
}

function upgradePlan() {
  alert("Upgrade system coming soon");
}

function personalization() {
  document.body.style.background = "#020617";
  alert("Dark theme activated");
}

async function openProfile() {
  const res = await fetch("/profile", { credentials:"include" });
  const data = await res.json();

  const name = prompt("Enter your name:", data.name || "");

  if (name !== null) {
    await fetch("/profile/update", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      credentials:"include",
      body: JSON.stringify({ name })
    });

    alert("Profile updated");

    // ✅ THIS WAS MISSING
    checkAuth();
  }
}

function openSettings() {
  alert("Settings panel coming soon");
}

function openHelp() {
  alert("Help center coming soon");
}
function downloadImage(url) {
  const a = document.createElement("a");
  a.href = url;
  a.download = "kojo-image.png";
  a.click();
}
function toggleImageMode() {
  imageMode = !imageMode;

  const btn = document.getElementById("imageModeBtn");

  if (imageMode) {
    btn.style.background = "#f59e0b"; // orange
    btn.innerText = "🖼 ON";
  } else {
    btn.style.background = "#1e293b";
    btn.innerText = "🖼";
  }
}
function activateImageMode() {
  imageMode = true;

  const btn = document.getElementById("imageModeBtn");
  btn.style.background = "#f59e0b";
  btn.innerText = "🖼 ON";

  document.getElementById("input").focus();
}
checkAuth();

</script>

</body>
</html>
