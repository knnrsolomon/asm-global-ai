<!DOCTYPE html>
<html>
<head>
  <title>ASM Global AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      display:flex;
      height:100vh;
      font-family: Arial, sans-serif;
      background:#0f172a;
      color:white;
    }

    .sidebar {
      width:240px;
      background:#020617;
      padding:20px;
    }

    .sidebar h2 {
      margin-bottom:20px;
    }

    .sidebar button {
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border:none;
      background:#1e293b;
      color:white;
      cursor:pointer;
      border-radius:6px;
    }

    .sidebar button.active {
      background:#3b82f6;
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    .topbar {
      padding:15px;
      background:#020617;
      display:flex;
      justify-content:space-between;
    }

    .mode {
      color:#3b82f6;
    }

    .chat {
      flex:1;
      padding:20px;
      overflow:auto;
    }

    .msg {
      display:flex;
      margin-bottom:10px;
    }

    .msg.user {
      justify-content:flex-end;
    }

    .bubble {
      max-width:60%;
      padding:10px 14px;
      border-radius:12px;
    }

    .user .bubble {
      background:#3b82f6;
    }

    .ai .bubble {
      background:#1e293b;
    }

    .inputBox {
      padding:15px;
      background:#020617;
      display:flex;
      gap:10px;
    }

    input {
      flex:1;
      padding:10px;
      border:none;
      border-radius:6px;
    }

    button.send {
      padding:10px 15px;
      background:#3b82f6;
      border:none;
      color:white;
      border-radius:6px;
      cursor:pointer;
    }

    #auth {
      position:fixed;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background:#0f172a;
    }

    #auth input {
      margin:5px;
      padding:10px;
      width:250px;
    }
  </style>
</head>

<body>

<div id="auth">
  <h2>ASM GLOBAL AI</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
  <p id="msg"></p>
</div>

<div class="sidebar">
  <h2>ASM AI</h2>
  <button class="active" onclick="setMode('asm', this)">Core AI</button>
  <button onclick="setMode('spiritlynk', this)">SpiritLynk</button>
  <button onclick="setMode('rgi', this)">RisingGem</button>
  <button onclick="setMode('finance', this)">Finance</button>
</div>

<div class="main">

  <div class="topbar">
    <div>Dashboard</div>
    <div class="mode" id="modeLabel">Mode: asm</div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="inputBox">
    <input id="input" placeholder="Type a message...">
    <button class="send" onclick="send()">Send</button>
  </div>

</div>

<script>

let mode = "asm";

function setMode(m, el) {
  mode = m;
  document.getElementById("modeLabel").innerText = "Mode: " + m;

  document.querySelectorAll(".sidebar button").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
}

async function checkAuth() {
  const res = await fetch("/me", { credentials:"include" });
  const data = await res.json();

  if (data.loggedIn) {
    document.getElementById("auth").style.display = "none";
  }
}

async function login() {
  const res = await fetch("/login", {
    method:"POST",
    credentials:"include",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if (data.success) checkAuth();
  else msg.innerText = data.error;
}

async function signup() {
  const res = await fetch("/signup", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  msg.innerText = data.success ? "Signup successful" : data.error;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  input.value = "";

  chat.innerHTML += `
    <div class="msg user">
      <div class="bubble">${text}</div>
    </div>
  `;

  const id = Date.now();

  chat.innerHTML += `
    <div class="msg ai" id="load-${id}">
      <div class="bubble">Typing...</div>
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;

  const res = await fetch("/chat", {
    method:"POST",
    credentials:"include",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ message: text, mode })
  });

  const data = await res.json();

  document.getElementById(`load-${id}`).outerHTML = `
    <div class="msg ai">
      <div class="bubble">${data.reply}</div>
    </div>
  `;

  chat.scrollTop = chat.scrollHeight;
}

// ENTER key support
input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});

checkAuth();

</script>

</body>
</html>
