name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔥 VALIDATE JS (REAL FILE PATH)
      - name: Validate JavaScript
        run: |
          node -e "new Function(require('fs').readFileSync('frontend/hub/index.html','utf8'))"

      # 🔐 DOCKER LOGIN
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: knnrsolomon
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 BUILD & PUSH
      - name: Build and Push
        run: |
          IMAGE=knnrsolomon/asm-ai-backend:latest
          docker build -t $IMAGE .
          docker push $IMAGE
