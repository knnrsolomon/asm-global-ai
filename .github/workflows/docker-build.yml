- name: Validate Frontend JavaScript
  run: |
    node <<EOF
    const fs = require("fs");

    const html = fs.readFileSync("frontend/hub/index.html", "utf8");

    const scriptMatch = html.match(/<script>([\s\S]*?)<\/script>/);

    if (!scriptMatch) {
      console.error("No <script> block found");
      process.exit(1);
    }

    const js = scriptMatch[1];

    try {
      new Function(js);
      console.log("JS VALID ✅");
    } catch (e) {
      console.error("JS ERROR ❌");
      console.error(e.message);
      process.exit(1);
    }
    EOF
