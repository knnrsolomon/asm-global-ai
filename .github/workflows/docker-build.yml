name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔥 VALIDATE FRONTEND JS (FIXED)
      - name: Validate Frontend JavaScript
        run: |
          node -e "
          const fs = require('fs');
          const html = fs.readFileSync('frontend/hub/index.html','utf8');

          const match = html.match(/<script>([\s\S]*?)<\/script>/);

          if (!match) {
            console.error('No script found');
            process.exit(1);
          }

          try {
            new Function(match[1]);
            console.log('JS VALID ✅');
          } catch (e) {
            console.error('JS ERROR ❌');
            console.error(e.message);
            process.exit(1);
          }
          "

      # 🔐 DOCKER LOGIN
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: knnrsolomon
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 BUILD & PUSH
      - name: Build and Push
        run: |
          IMAGE=knnrsolomon/asm-ai-backend:latest
          docker build -t $IMAGE .
          docker push $IMAGE
